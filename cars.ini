; ============================================================
;  G29 FFB Mod — per-car engine curves for NFS Underground 2
;
;  Format:
;    [CarName]           matches config.ini [Engine] CarName=
;    IdleRpm=            RPM at idle (typically 700–900)
;    RedlineRpm=         RPM at redline (where power peaks)
;    TorqueCurve=        rpm:norm pairs, comma-separated, ascending RPM
;                        norm is 0.0–1.0 (1.0 = peak torque)
;
;  Curves exported from nfsu2-car-tuning Python project.
;  Run  scripts/export_curves.py  to regenerate this file.
;
;  Tip: if your car is not listed, use CarName=default for the
;       generic 4-cylinder fallback built into the mod.
; ============================================================

[default]
IdleRpm=800
RedlineRpm=8000
TorqueCurve=800:0.45,1000:0.55,2000:0.70,3000:0.85,4000:1.00,5000:0.95,6000:0.85,7000:0.75,8000:0.65

