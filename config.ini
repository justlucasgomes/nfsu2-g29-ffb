; ============================================================
;  G29 FFB Wrapper — NFS Underground 2
;  config.ini  (deploy to NFSU2 game root folder)
;
;  Calibrated from two real game sources:
;
;  ASSETTO CORSA (precision / technique)
;    Documents\Assetto Corsa\cfg\controls.ini
;    -> MIN_FF=0.05  CURBS=0.4  ROAD=0.5  BRAKE_GAMMA=2.4  LOCK=900
;
;  FORZA HORIZON 5 (feel / weight curve)
;    C:\XboxGames\Forza Horizon 5\Content\media\ControllerFFB.ini
;    -> SpringScaleSpeed0=2m/s->15%   SpringScaleSpeed1=15m/s->100%
;    -> InRaceSpringMaxForce=0.5   DampingMaxForce=0.31   DynFFBScale=0.42
;    -> RightVibrationWavelength=21ms(47Hz)  LeftVibrationWavelength=38ms(26Hz)
; ============================================================

[ForceFeedback]
Enabled=1

; Self-Aligning Torque gain (0-100). Used as satGain = CenterSpring/100 * 0.5
CenterSpring=60

; Legacy field — unused by the three-point speed curve below.
SpeedWeight=60

; Three-point speed weight curve (FH5-style):
;   0 km/h -> LowSpeedWeight%   36 km/h -> MidSpeedWeight%   108+ km/h -> HighSpeedWeight%
LowSpeedWeight=8
MidSpeedWeight=38
HighSpeedWeight=77

; AC: MIN_FF=0.05 — offset added to any non-zero force to prevent dead center.
MinimumForce=5

; Road texture vibration (47 Hz). Scales with speed^2.
RoadTexture=12
; Additive cornering texture (rack kick) — scales with lateral G, independent of speed.
CornerTextureStrength=18

; Traction-loss vibration (26 Hz).
SlipVibration=25

; Kerb / rumble strip pulse (50 Hz square wave).
CurbEffect=35
CurbPulseMs=80

; Engine Idle Vibration — subtle sine vibration on ConstantForce at low speed.
; Uses longAccel as engine-load proxy. Fully absent above IdleSpeedThreshold km/h.
; Set EnableEngineIdleVibration=0 to disable completely.
EnableEngineIdleVibration=1
IdleVibrationStrength=4
RevVibrationStrength=8
CutVibrationStrength=3
IdleSpeedThreshold=15

; Reduces spring when front grip is lost (understeer feedback).
UndersteerLightening=30

; FH5: InRaceDampingMaxForce=0.31 * DampingScale=0.33 ~= 10% base + this.
DamperStrength=15

; Front Tire Load SAT — spring boost proportional to lateral G.
FrontLoadStrength=21

; Rack Inertia Torque — brief damper boost from angular acceleration of the wheel.
; Simulates column/rack mass: felt at turn-in, fades once speed stabilizes.
RackInertiaStrength=18
; Rack Release — brief damper reduction on fast wheel deceleration (unwinding).
; Simulates rack unloading: makes exit-of-corner feel fluid, not sticky.
RackReleaseStrength=12
; Straight-Line Stability — micro-damp near center (|steer|<0.03 && lateralNorm<0.15).
; Filters road crown / surface oscillation without affecting cornering.
StraightLineStability=15

; Low Speed Hydraulic Assist — spring reduction at standstill, fully gone at 15 km/h.
; Simulates hydraulic power steering feel. Keep low (5-15) to stay subtle.
LowSpeedAssistStrength=10

; Caster Return Torque — spring boost = steerAbs * clamp(speed/50, 0, 1) * gain.
; Simulates pneumatic caster: stronger pull-back at higher speeds.
CasterReturnStrength=22

; High-speed steering damping — resists fast wheel inputs at speed.
; steerVelocity normalized to 3 lock/s; full boost above 55 m/s (198 km/h).
HighSpeedDampingStrength=20

; Lateral G + SAT combined into ConstantForce (0-100).
LateralForce=56

; Collision impulse on sudden speed loss.
CollisionForce=55
CollisionThreshold=0.15
CollisionDurationMs=60

; Rear Grip Loss Lightening — spring reduction proportional to rear slip (0..1).
; Gives a "support loss" feel before the corrective torque kicks in.
RearLightenStrength=12

; Countersteer assist: opposing torque applied on oversteer detection.
; CountersteerAssist = strength 0-100.  CountersteerThreshold = wheelSpinMax to activate.
; Rear Slip Assist — contra-esterço suavizado ao detectar oversteer
RearSlipAssistStrength=20
RearSlipThreshold=0.22
RearSlipMaxTorque=16
RearSlipMinSpeed=50

; Load Transfer Weight — spring adicional proporcional ao G lateral
LoadTransferGain=35
LoadTransferMax=30
LoadTransferSmooth=0.15

; Longitudinal Load Transfer — volante fica mais pesado na frenagem (% por 1G).
; Simulates front axle loading under braking. 0 to disable.
LongLoadStrength=20

[Input]
; Physical steering range of the wheel in degrees.
SteeringRange=900

; Virtual lock in game degrees. ratio = SteeringRange / VirtualSteeringLock.
; 900/180 = 4.5x — fast FH5-style steering.
VirtualSteeringLock=180

; Response curve: 1.0=linear, >1=progressive. 1.15 = near-linear, responsive center.
SteeringGamma=1.05

; Software deadzone after hardware axis normalization.
SteeringDeadzone=0.005

SteeringSensitivity=1.0

; Dynamic steering ratio (FH5-style) — lock reduz com velocidade
DynamicSteering=1
LowSpeedLock=240
MidSpeedLock=180
HighSpeedLock=120
HighSpeedSensitivity=1.27

; Yaw assist — amplificacao progressiva do esterco pela velocidade
YawAssistStrength=0.25
YawAssistStartSpeed=40
YawAssistFullSpeed=200

PedalDeadzone=0.01

; Brake pedal gamma (AC reference: 2.4). Light at start, progressive to end.
BrakeGamma=2.4

; Axis mapping confirmed from AC controls.ini (G29 profile):
;   [STEER]    AXLE=0 -> lX            (steering)
;   [THROTTLE] AXLE=1 -> lY            (gas,   MIN=1 MAX=-1 = inverted)
;   [BRAKES]   AXLE=5 -> lRz           (brake, MIN=1 MAX=-1 = inverted)
;   [CLUTCH]   AXLE=6 -> rglSlider[0]  (clutch,MIN=1 MAX=-1 = inverted)
AxisSteeringIdx=0
AxisGasIdx=1
AxisBrakeIdx=5
AxisClutchIdx=6

InvertSteering=0
InvertGas=0
InvertBrake=0

[Telemetry]
; Auto-find game addresses via pattern scan (recommended).
UsePatternScan=1

; NFSU2 NA static addresses (image base 0x400000).
; Two-level pointer chain (verified via Cheat Engine + binary analysis):
;   container  = *(DWORD*)PtrPlayerCarPtr
;   car_base   = *(DWORD*)(container + OfsCarBase)
;   rpm        = *(float*)(car_base + 0x400)
; Found via 14 virtual call sites all loading from 0x00870910.
; Pointer chain disabled — static pointer still under investigation.
; Using pattern-scan speed fallback only (no struct reads).
PtrPlayerCarPtr=0x00000000
OfsCarBase=0x00
OfsSpeedMps=0x00DC
OfsLateralAccel=0x0160
OfsSteerAngle=0x0148

MaxSpeedMps=88.0
MaxLateralAccelMs2=25.0


[CenterHold]
; Narrow restoration zone active within ±CenterHoldRange of center.
; Force = (CenterHoldStrength + speedFactor * CenterHoldHighSpeedBoost) * fadeCurve
; speedFactor = clamp(speed / 50 m/s, 0, 1)  →  full boost at 180 km/h
CenterHoldRange=0.06
CenterHoldStrength=0.10
CenterHoldHighSpeedBoost=0.22
CenterHoldSmooth=0.15

[FrontGripFeedback]
; frontSlip = abs(steerAngle) * lateralNorm  (0..1 product)
; Scrub activates when frontSlip > FrontSlipThreshold
FrontSlipThreshold=0.35
ScrubGain=20
ScrubFrequency=32
ScrubMax=18

; Understeer lightening activates when frontSlip > UndersteerThreshold
UndersteerThreshold=0.55
UndersteerMaxReduction=25

[ShiftKick]
; Brief ConstantForce impulse on gear change.
; Upshift = nudge left (-), downshift = nudge right (+).
ShiftKickEnabled=1
; Strength as % of max force (0-100). Keep low — 10-20 is natural.
ShiftKickStrength=15
; Impulse duration in milliseconds (10-200).
ShiftKickDurationMs=30

[Engine]
; Car name to load from cars.ini (must match a section header exactly).
; Leave empty or set to "default" to use the generic 4-cylinder curve.
; Example: CarName=240SX  or  CarName=Supra  or  CarName=WRX
CarName=default

; IdleRpm / RedlineRpm are used as fallback when cars.ini cannot be read.
; When CarName is found in cars.ini, those values take priority over these.
IdleRpm=800
RedlineRpm=8000

[AntiOscillation]
; ── Anti-oscillation system (v0.6.0) ─────────────────────────────────────────
;
; Controls the three-layer system that eliminates countersteer zig-zag:
;   Layer 1 — Driver Intent Smoothing: transforms raw steering into a smooth
;             intent signal so assists react to driver intention, not frame jitter.
;   Layer 2 — Rear Slip Hysteresis: the rear-slip signal rises fast but falls
;             slowly, preventing assist ping-pong during oversteer correction.
;   Layer 3 — Assist Hold Window: once slip exceeds threshold, the assist is
;             held at full strength for a configurable window (250 ms default).

; Steering intent EMA alpha (0.01=very smooth / slow, 1.0=instant / no filter).
; At 10 ms tick: 0.18 → ~55 ms time constant. Increase if response feels delayed.
SteerIntentAlpha=0.18

; How fast the held-slip envelope rises when real slip increases.
; 0.35 = rises to 63% of actual slip in ~3 ticks (~30 ms).
SlipHeldRiseAlpha=0.35

; How fast the held-slip envelope falls when real slip decreases.
; 0.12 = slower decay → assist held longer during momentary grip recovery.
SlipHeldFallAlpha=0.12

; Held-slip magnitude (0–1) that arms the 250 ms hold window.
; 0.35 = triggers after moderate rear slip. Raise to 0.5 for less aggressive hold.
HoldThreshold=0.35

; Seconds the assist is sustained at full after threshold is crossed.
; 0.25 = 250 ms. Prevents abrupt assist cutoff mid-correction.
HoldDurationSec=0.25

[General]
; 0=none  1=errors  2=info  3=debug
LogLevel=1
DisableASI=0

